<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ryan's Launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Desktop -->
    <div id="desktop"></div>

    <!-- Start Menu -->
    <div id="startMenu" class="menu"></div>

    <!-- Popup submenu -->
    <div id="subMenu" class="submenu"></div>

    <!-- Taskbar -->
    <div id="taskbar">

        <button id="launchBtn">
            Start
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
